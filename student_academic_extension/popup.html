<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Actions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { width: 320px; min-height: 400px; }
  </style>
</head>
<body class="bg-background text-foreground">
  <div class="p-4 space-y-4">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-bold">Quick Actions</h1>
      <button id="openPanel" class="text-xs text-primary hover:underline">Open Panel</button>
    </div>
    <div class="grid grid-cols-2 gap-2" id="actionsGrid">
      <a href="chrome-extension://__MSG_@@extension_id__/dist/index.html#/attendance" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-border hover:bg-accent transition-colors">
        <div class="p-2 rounded-md bg-muted text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M9 16l2 2 4-4"/></svg>
        </div>
        <span class="text-xs font-medium">Attendance</span>
      </a>
      <a href="chrome-extension://__MSG_@@extension_id__/dist/index.html#/comparison" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-border hover:bg-accent transition-colors">
        <div class="p-2 rounded-md bg-muted text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 5 4-9"/></svg>
        </div>
        <span class="text-xs font-medium">Results</span>
      </a>
      <a href="chrome-extension://__MSG_@@extension_id__/dist/index.html#/timetable" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-border hover:bg-accent transition-colors">
        <div class="p-2 rounded-md bg-muted text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="text-xs font-medium">Timetable</span>
      </a>
      <a href="chrome-extension://__MSG_@@extension_id__/dist/index.html#/notifications" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-border hover:bg-accent transition-colors">
        <div class="p-2 rounded-md bg-muted text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </div>
        <span class="text-xs font-medium">Notices</span>
      </a>
      <a href="chrome-extension://__MSG_@@extension_id__/dist/index.html#/quick-actions" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-border hover:bg-accent transition-colors">
        <div class="p-2 rounded-md bg-muted text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
        </div>
        <span class="text-xs font-medium">Manage</span>
      </a>
    </div>
    <div class="pt-2 border-t border-border">
      <button id="openSidePanel" class="w-full py-2 bg-primary text-primary-foreground rounded-md text-sm hover:opacity-90 transition-opacity">
        Open Academic Portal
      </button>
    </div>
  </div>
  <script>
    document.getElementById('openPanel').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('dist/index.html#/quick-actions') })
    })
    document.getElementById('openSidePanel').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('dist/index.html') })
    })
    document.querySelectorAll('#actionsGrid a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault()
        const href = link.getAttribute('href')
        chrome.tabs.create({ url: href })
      })
    })
  </script>
</body>
</html>
